<section class="newsletter-section" aria-label="Newsletter">
    <h2 class="newsletter-title">{{ i18n "newsletter_title" }}</h2>
    <p class="newsletter-subtitle">{{ i18n "newsletter_subtitle" }}</p>
    <form class="newsletter-form" action="#" method="post" onsubmit="event.preventDefault();">
        <label for="newsletter-email" class="sr-only">{{ i18n "newsletter_placeholder" }}</label>
        <input type="email" id="newsletter-email" name="email" placeholder="{{ i18n "newsletter_placeholder" }}" required>
        <button type="submit">{{ i18n "newsletter_cta" }}</button>
    </form>
    <p class="newsletter-footnote">{{ i18n "newsletter_footnote" }}</p>
</section>
