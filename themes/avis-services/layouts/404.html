{{ define "main" }}

<section class="error-page">
    <div class="container">
        <span class="error-code">404</span>
        <h1>{{ i18n "error_404_title" }}</h1>
        <p>{{ i18n "error_404_description" }}</p>
        <div class="error-links">
            <a href="{{ "/" | relLangURL }}" class="btn-primary">{{ i18n "error_404_home" }}</a>
            <a href="{{ "blog/" | relLangURL }}" class="btn-outline">{{ i18n "error_404_blog" }}</a>
        </div>
    </div>
</section>

{{ end }}
