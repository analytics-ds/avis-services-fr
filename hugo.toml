baseURL = "https://avis-services.fr/"
title = "Avis Services"
theme = "avis-services"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableEmoji = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    title = "Avis Services"
    contentDir = "content"
    [languages.fr.params]
      description = "Avis et comparatifs de services en ligne : electromenager reconditionne, spa de luxe et bien plus."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    title = "Avis Services"
    contentDir = "content/en"
    [languages.en.params]
      description = "Reviews and comparisons of online services: refurbished appliances, luxury spas and more."

[taxonomies]
  category = "categories"
  tag = "tags"

# Menus supprimes : la nav est construite dynamiquement depuis content/categories/

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[params]
  description = "Avis et comparatifs de services en ligne"
  default_og_image = "/images/og-default.jpg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Electromenager reconditionne", "Spa de luxe", "Services aux seniors", "Avis de services en ligne"]

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true

