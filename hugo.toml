baseURL = "https://avis-services.fr/"
title = "Avis Services"
theme = "avis-services"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableEmoji = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    title = "Avis Services"
    [languages.fr.params]
      description = "Avis et comparatifs de services en ligne : electromenager reconditionne, spa de luxe et bien plus."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    title = "Avis Services"
    [languages.en.params]
      description = "Reviews and comparisons of online services: refurbished appliances, luxury spas and more."

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu FR
[[languages.fr.menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1
[[languages.fr.menus.main]]
  name = "Electromenager"
  url = "/categories/electromenager-reconditionne/"
  weight = 2
[[languages.fr.menus.main]]
  name = "Bien-etre"
  url = "/categories/spa-de-luxe/"
  weight = 3
[[languages.fr.menus.main]]
  name = "Seniors"
  url = "/categories/services-aux-seniors/"
  weight = 4
[[languages.fr.menus.main]]
  name = "Le Blog"
  url = "/blog/"
  weight = 99

# Menu EN
[[languages.en.menus.main]]
  name = "Home"
  url = "/en/"
  weight = 1
[[languages.en.menus.main]]
  name = "Appliances"
  url = "/en/categories/refurbished-appliances/"
  weight = 2
[[languages.en.menus.main]]
  name = "Wellness"
  url = "/en/categories/luxury-spas/"
  weight = 3
[[languages.en.menus.main]]
  name = "Seniors"
  url = "/en/categories/senior-services/"
  weight = 4
[[languages.en.menus.main]]
  name = "The Blog"
  url = "/en/blog/"
  weight = 99

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[params]
  description = "Avis et comparatifs de services en ligne"
  default_og_image = "/images/og-default.jpg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Electromenager reconditionne", "Spa de luxe", "Services aux seniors", "Avis de services en ligne"]

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true
